<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="1">
            <tr> <!-- linha da coluna -->  
                <td>Célula 1</td>
                <td>Célula 2</td>
                <td>Célula 3</td>
            </tr>
            <tr>
                <td>Célula 4</td> <!-- coluna -->
                <td>Célula 5</td>
                <td>Célula 6</td>
            </tr>
    </table>
     <table border="1">
            <tr>   
                <td colspan="3">Célula 1</td>
            </tr>
            <tr> <!-- linha da coluna -->
                <td>Célula 2</td>
                <td>Célula 3</td>
                <td>Célula 4</td>
            </tr>
    </table>
    <table border="1">
            <tr>   
                <td rowspan="3">Célula 1</td>
                <td>Célula 2</td>
            </tr>
            <tr> <!-- linha da coluna -->            
                <td>Célula 3</td>
            </tr>
            <tr>    
                <td>Célula 4</td>
            </tr>
    </table
</body>
</html>
